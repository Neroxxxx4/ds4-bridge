name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a build manually from the GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      # Cache Rust build artifacts — cuts rebuild time from ~10 min to ~2 min
      - uses: Swatinem/rust-cache@v2
        with:
          workingDirectory: src-tauri

      - name: Install JS dependencies
        run: npm install

      - name: Install Pillow for icon generation
        run: pip install pillow

      - name: Generate app icon (PS4 controller)
        shell: python
        run: |
          import os, math
          from PIL import Image, ImageDraw

          S = 512
          img = Image.new('RGBA', (S, S), (0, 0, 0, 0))
          d = ImageDraw.Draw(img)

          BG   = (14, 14, 22, 255)
          BODY = (28, 28, 44, 255)
          GRIP = (22, 22, 36, 255)
          ACC  = (108, 99, 255, 255)
          DIM  = (50, 48, 80, 255)
          W    = (220, 215, 255, 255)

          # Background circle
          d.ellipse([0, 0, S, S], fill=BG)

          # Controller body (wide horizontal pill)
          d.rounded_rectangle([72, 148, 440, 316], radius=60, fill=BODY)

          # Left grip
          d.rounded_rectangle([80, 270, 200, 400], radius=36, fill=GRIP)
          # Right grip
          d.rounded_rectangle([312, 270, 432, 400], radius=36, fill=GRIP)

          # Lightbar (thin strip at top of body)
          d.rounded_rectangle([190, 155, 322, 167], radius=6, fill=ACC)

          # --- Left side: D-pad ---
          cx, cy = 174, 232
          arm = 22
          th  = 15
          # horizontal arm
          d.rounded_rectangle([cx - arm, cy - th//2, cx + arm, cy + th//2], radius=4, fill=DIM)
          # vertical arm
          d.rounded_rectangle([cx - th//2, cy - arm, cx + th//2, cy + arm], radius=4, fill=DIM)

          # Left stick (below d-pad)
          d.ellipse([116, 296, 196, 376], fill=DIM)
          d.ellipse([136, 316, 176, 356], fill=ACC)

          # --- Right side: Face buttons ---
          bx, by = 338, 232
          r = 16
          face = [
              ((bx,      by - 28), (64,  200, 80,  220)),   # up    = Triangle (green)
              ((bx + 28, by     ), (220, 80,  80,  220)),   # right = Circle   (red)
              ((bx,      by + 28), (100, 140, 220, 220)),   # down  = Cross    (blue)
              ((bx - 28, by     ), (200, 80,  200, 220)),   # left  = Square   (pink)
          ]
          for (fx, fy), col in face:
              d.ellipse([fx - r, fy - r, fx + r, fy + r], fill=col)

          # Right stick (right of face buttons)
          d.ellipse([316, 296, 396, 376], fill=DIM)
          d.ellipse([336, 316, 376, 356], fill=ACC)

          # Share / Options small buttons
          d.ellipse([218, 212, 238, 228], fill=DIM)
          d.ellipse([274, 212, 294, 228], fill=DIM)

          # PS logo button (center)
          d.ellipse([238, 246, 274, 282], fill=DIM)
          d.ellipse([248, 256, 264, 272], fill=ACC)

          # Touchpad (center rectangle)
          d.rounded_rectangle([208, 168, 304, 210], radius=8, fill=DIM)

          os.makedirs('src-tauri/icons', exist_ok=True)
          img.save('src-tauri/icons/source.png')

      - name: Generate all icon sizes
        run: npx tauri icon src-tauri/icons/source.png

      - name: Build release installer
        run: npm run tauri build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DS4-Bridge-Windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
